name: Code Review

on:
  pull_request:
    types: [opened, synchronize]
  pull_request_review_comment:
    types: [created]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./
        with:
          gemini-api-key: ${{ secrets.GEMINI_API_KEY }}
